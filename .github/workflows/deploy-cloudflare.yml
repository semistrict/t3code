name: Deploy Cloudflare

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Build ExecutionAgent binary
        working-directory: apps/server
        run: bun run build:agent

      - name: Copy binary to cloudflare dist
        run: mkdir -p apps/cloudflare/dist && cp apps/server/dist/t3code-execution-agent apps/cloudflare/dist/

      - name: Build web assets
        working-directory: apps/web
        run: bun run build

      - name: Deploy Worker
        working-directory: apps/cloudflare
        run: npx wrangler deploy --alias fast-check:./src/stubs/fast-check.ts
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
